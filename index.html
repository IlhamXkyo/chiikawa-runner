<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Game - Chiikawa Runner</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI Overlay -->
        <div class="game-ui">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="score-display">
                    <span class="score-label">SCORE</span>
                    <span id="scoreValue" class="score-value">0</span>
                </div>
                <div class="coin-display">
                    <span id="coinIcon" class="coin-icon-game">🥕</span>
                    <span id="coinValue" class="coin-value">0</span>
                </div>
                <div class="high-score-display">
                    <span class="hs-label">HIGH</span>
                    <span id="highScoreValue" class="hs-value">0</span>
                </div>
            </div>
            
            <!-- Pause Button -->
            <button id="pauseBtn" class="pause-button">⏸</button>
        </div>
        
        <!-- Start Screen -->
        <div id="startScreen" class="overlay-screen start-screen">
            <div class="overlay-content">
                <h2 class="ready-text">SIAP?</h2>
                <p class="start-instruction">Tekan SPACE atau TAP untuk mulai!</p>
                <div class="controls-hint">
                    <div class="control-item">
                        <span class="key">↑</span>
                        <span>Lompat</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↓</span>
                        <span>Merunduk</span>
                    </div>
                    <div class="control-item">
                        <span class="key">← →</span>
                        <span>Pindah Jalur</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Pause Screen -->
        <div id="pauseScreen" class="overlay-screen pause-screen hidden">
            <div class="overlay-content">
                <h2 class="pause-text">PAUSE</h2>
                <button id="resumeBtn" class="overlay-btn">Lanjutkan</button>
                <button id="quitBtn" class="overlay-btn quit">Keluar</button>
            </div>
        </div>
        
        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="overlay-screen game-over-screen hidden">
            <div class="overlay-content">
                <div class="game-over-logo">
                    <span class="sad-emoji">😢</span>
                    <h2 class="game-over-text">GAME OVER</h2>
                    <span class="sad-emoji">😢</span>
                </div>
                <div class="final-stats">
                    <div class="stat-row">
                        <span class="stat-name">Score</span>
                        <span id="finalScore" class="stat-number">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">Coins</span>
                        <span id="finalCoins" class="stat-number">0</span>
                    </div>
                    <div class="stat-row highlight">
                        <span class="stat-name">Total</span>
                        <span id="finalTotal" class="stat-number">0</span>
                    </div>
                </div>
                <div class="new-record hidden" id="newRecord">
                    <span class="record-badge">🏆 NEW RECORD!</span>
                </div>
                <div class="game-over-buttons">
                    <button id="restartBtn" class="overlay-btn primary">Main Lagi</button>
                    <button id="homeBtn" class="overlay-btn">Menu Utama</button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Controls -->
        <div class="mobile-controls">
            <div class="swipe-area left" data-direction="left"></div>
            <div class="swipe-area right" data-direction="right"></div>
            <div class="swipe-area up" data-direction="up"></div>
            <div class="swipe-area down" data-direction="down"></div>
        </div>
        
        <!-- Touch Hints -->
        <div class="touch-hints">
            <div class="swipe-hint swipe-left">← Geser</div>
            <div class="swipe-hint swipe-right">Geser →</div>
            <div class="swipe-hint swipe-up">↑ Lompat</div>
            <div class="swipe-hint swipe-down">↓ Runduk</div>
        </div>
    </div>
    
    <!-- Audio System -->
    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
