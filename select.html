<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiikawa Runner - ちいかわランナー</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <!-- Background Elements -->
        <div class="bg-pattern"></div>
        <div class="floating-clouds">
            <div class="cloud cloud-1">☁️</div>
            <div class="cloud cloud-2">☁️</div>
            <div class="cloud cloud-3">☁️</div>
        </div>
        
        <!-- Main Content -->
        <div class="content-wrapper">
            <!-- Logo Area -->
            <div class="logo-container">
                <div class="logo-chiikawa">ちいかわ</div>
                <h1 class="game-title">CHIIKAWA<br><span class="runner-text">RUNNER</span></h1>
                <div class="title-decoration">
                    <span class="star">⭐</span>
                    <span class="heart">💖</span>
                    <span class="star">⭐</span>
                </div>
            </div>
            
            <!-- Character Preview -->
            <div class="character-preview">
                <div class="character-float chiikawa-char">🐱</div>
                <div class="character-float hachiware-char">🐰</div>
                <div class="character-float usagi-char">🍙</div>
            </div>
            
            <!-- Play Button -->
            <div class="play-section">
                <button id="playBtn" class="play-button">
                    <span class="play-icon">▶</span>
                    <span class="play-text">PLAY</span>
                </button>
                <p class="instruction-text">Klik untuk memulai petualangan!</p>
            </div>
            
            <!-- High Score Display -->
            <div class="high-score-box">
                <span class="trophy">🏆</span>
                <span class="high-score-label">HIGH SCORE</span>
                <span id="highScoreDisplay" class="high-score-value">0</span>
            </div>
        </div>
        
        <!-- Music Control -->
        <div class="music-control">
            <button id="musicToggle" class="music-btn">
                <span id="musicIcon">🎵</span>
            </button>
            <span class="music-label">Una na Una</span>
        </div>
        
        <!-- Footer -->
        <footer class="main-footer">
            <p>🌸 ちいかわファンメイドゲーム 🌸</p>
        </footer>
    </div>
    
    <!-- Audio System -->
    <script src="js/audio.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
